<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VelezyRicaurte Inmobiliaria</title>
  <script>
    // Truco SPA: guarda la ruta actual en sessionStorage y redirige al index
    var path = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
